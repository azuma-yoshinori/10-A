<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクター選択画面</title>
    <link rel="stylesheet" href="7-a.css">
</head>
<body>

    <header>
        <h1>バトル・オブ・レジェンド - キャラクター選択</h1>
        <p>使いたいキャラクターを選んで、詳細をチェックしよう！</p>
    </header>

    <main class="container">

        <div class="card">
            <div class="char-img fire-type">🔥</div>
            <div class="card-content">
                <span class="badge fire">火属性</span>
                <h2 class="char-name">フレア・ナイト</h2>
                <p class="char-desc">圧倒的な火力で敵を焼き尽くす、近接攻撃のスペシャリスト。</p>
            </div>
        </div>

        <div class="card">
            <div class="char-img water-type">💧</div>
            <div class="card-content">
                <span class="badge water">水属性</span>
                <h2 class="char-name">アクア・メイジ</h2>
                <p class="char-desc">癒やしの魔法と、敵の動きを鈍らせる氷の術を操る賢者。</p>
            </div>
        </div>

        <div class="card">
            <div class="char-img wind-type">⚡</div>
            <div class="card-content">
                <span class="badge wind">雷属性</span>
                <h2 class="char-name">ライトニング・ガンナー</h2>
                <p class="char-desc">目にも留まらぬスピードで戦場を駆け抜け、雷撃を放つ暗殺者。</p>
            </div>
        </div>

        <div class="card">
            <div class="char-img forest-type">🌳</div>
            <div class="card-content">
                <span class="badge forest">草属性</span>
                <h2 class="char=name">フォレスト・シールダー</h2>
                <p class="char-desc">巨大な盾でどんな攻撃をも防ぐ、木々を操る守護者。</p>
            </div>
        </div>

    </main>

</body>
</html>
